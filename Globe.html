<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Globe</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:transparent;overflow:hidden;font-family:-apple-system,system-ui,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
  /* ── LOADER STAGE ── */
  #loader{position:fixed;inset:0;z-index:20;cursor:pointer;transition:opacity .9s cubic-bezier(.6,.0,.3,1), filter .9s cubic-bezier(.6,.0,.3,1), transform 1.1s cubic-bezier(.5,0,.3,1)}
  #loader.go{opacity:0;filter:blur(28px) brightness(2.4);transform:scale(2.4)}
  #loader::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(ellipse at 50% 50%, #0a1422 0%, #050810 45%, #000 100%);
    z-index:-2;
  }
  #stars{position:absolute;inset:0;z-index:-1;pointer-events:none}
  #scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  #gl{display:block}
  #atmo{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:78vmin;height:78vmin;border-radius:50%;
    box-shadow:
      0 0 60px 10px rgba(80,150,220,0.22),
      0 0 140px 40px rgba(70,140,220,0.14),
      0 0 240px 80px rgba(40,100,180,0.07);
    pointer-events:none;
  }
  /* shockwave ring on click */
  #shock{
    position:absolute;top:50%;left:50%;width:10px;height:10px;
    border-radius:50%;
    border:2px solid rgba(180,220,255,0.9);
    transform:translate(-50%,-50%) scale(1);
    opacity:0;pointer-events:none;
  }
  #loader.go #shock{animation:shock 1.0s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes shock{
    0%{opacity:.95;transform:translate(-50%,-50%) scale(1);border-width:3px}
    60%{opacity:.5}
    100%{opacity:0;transform:translate(-50%,-50%) scale(140);border-width:0.5px}
  }
  /* white flash */
  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}
  #loader.go #flash{animation:flash 1.0s ease-out forwards}
  @keyframes flash{0%{opacity:0}25%{opacity:.85}100%{opacity:0}}

  /* enter hint */
  .label{
    position:absolute;left:50%;bottom:7vmin;
    transform:translateX(-50%);
    color:#cfe0f5;font-size:12px;letter-spacing:.32em;
    text-transform:uppercase;opacity:0;
    font-family:ui-monospace,Menlo,monospace;
    animation:fadeIn 1s ease-out 1.8s forwards, pulse 2.4s ease-in-out 2.8s infinite;
  }
  .label .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#7ab6ff;margin-right:10px;vertical-align:1px;box-shadow:0 0 12px #7ab6ff}
  @keyframes fadeIn{to{opacity:.85}}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

  /* ── APP STAGE ── */
  #app{
    position:fixed;inset:0;z-index:10;
    display:flex;flex-direction:column;
    background:
      radial-gradient(120% 90% at 80% -10%, #ffe5c8 0%, transparent 55%),
      radial-gradient(80% 70% at -5% 100%, #cfe1ff 0%, transparent 60%),
      linear-gradient(180deg,#fbf8f3 0%,#f5efe6 100%);
    color:#1a2030;
    opacity:0;transform:scale(1.06);filter:blur(14px);
    transition:opacity 1.0s cubic-bezier(.2,.6,.2,1) .25s, transform 1.1s cubic-bezier(.2,.6,.2,1) .25s, filter 1.0s cubic-bezier(.2,.6,.2,1) .25s;
    pointer-events:none;
    overflow-y:auto;
  }
  #app.show{opacity:1;transform:scale(1);filter:blur(0);pointer-events:auto}
  .nav{
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 36px;
  }
  .brand{display:flex;align-items:center;gap:12px;font-weight:700;letter-spacing:.04em;font-size:15px}
  .brand-dot{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #4aa8ff 0%, #0e4dc0 70%, #082673 100%);box-shadow:0 4px 16px rgba(14,77,192,.35), inset -3px -4px 6px rgba(0,0,0,.2)}
  .nav-links{display:flex;gap:28px;font-size:14px;color:#3b4660}
  .nav-links a{color:inherit;text-decoration:none;opacity:.78;transition:opacity .2s}
  .nav-links a:hover{opacity:1}
  .cta{
    padding:9px 18px;border-radius:999px;
    background:#0e1a2e;color:#fff;font-size:13px;font-weight:600;
    border:none;cursor:pointer;letter-spacing:.02em;
    box-shadow:0 6px 18px rgba(14,26,46,.25);
    transition:transform .2s, box-shadow .2s;
  }
  .cta:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(14,26,46,.3)}

  .hero{
    flex:0 0 auto;
    padding:32px 36px 16px;max-width:1100px;width:100%;margin:0 auto;
  }
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-family:ui-monospace,Menlo,monospace;font-size:11px;
    letter-spacing:.28em;text-transform:uppercase;color:#3a6fbf;
    background:rgba(58,111,191,.08);padding:6px 12px;border-radius:999px;
    border:1px solid rgba(58,111,191,.18);
  }
  .eyebrow .pulse{width:6px;height:6px;border-radius:50%;background:#3a6fbf;box-shadow:0 0 8px #3a6fbf;animation:pulse 1.8s ease-in-out infinite}
  h1.title{
    font-size:clamp(34px,5.4vw,64px);line-height:1.02;
    font-weight:800;letter-spacing:-.025em;
    margin:18px 0 12px;color:#0e1a2e;text-wrap:balance;
  }
  h1.title em{font-style:normal;background:linear-gradient(90deg,#0e4dc0 0%,#3a6fbf 50%,#d97a2e 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:clamp(15px,1.4vw,18px);color:#475067;max-width:640px;line-height:1.55}

  .team{
    max-width:1100px;width:100%;margin:0 auto;padding:24px 36px 48px;
    display:grid;grid-template-columns:repeat(5,1fr);gap:18px;
  }
  @media(max-width:900px){.team{grid-template-columns:repeat(2,1fr)}}
  .card{
    background:rgba(255,255,255,.7);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.9);
    border-radius:18px;padding:14px 14px 16px;
    box-shadow:0 1px 0 rgba(255,255,255,.9) inset, 0 12px 32px -12px rgba(20,30,60,.18);
    transform:translateY(20px);opacity:0;
    transition:transform .8s cubic-bezier(.2,.7,.2,1), opacity .8s ease-out, box-shadow .25s;
  }
  #app.show .card{transform:translateY(0);opacity:1}
  #app.show .card:nth-child(1){transition-delay:.55s}
  #app.show .card:nth-child(2){transition-delay:.65s}
  #app.show .card:nth-child(3){transition-delay:.75s}
  #app.show .card:nth-child(4){transition-delay:.85s}
  #app.show .card:nth-child(5){transition-delay:.95s}
  .card:hover{box-shadow:0 1px 0 rgba(255,255,255,.9) inset, 0 18px 38px -10px rgba(20,30,60,.28);transform:translateY(-3px)}
  .ava{
    width:100%;aspect-ratio:1/1;border-radius:14px;overflow:hidden;
    background:#eef2f8;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.7);
  }
  .ava img{width:100%;height:100%;object-fit:cover;display:block}
  .card .name{margin-top:10px;font-weight:700;font-size:13px;color:#1a2030;letter-spacing:.01em}
  .card .role{font-size:11px;color:#5b6783;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}

  .footer{
    max-width:1100px;width:100%;margin:0 auto;padding:0 36px 28px;
    display:flex;justify-content:space-between;align-items:center;
    font-size:12px;color:#7a849a;
    border-top:1px solid rgba(20,30,60,.08);padding-top:18px;
  }

  .hint{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,calc(-50% + 22vmin));
    color:#cfe0f5;font-size:10.5px;letter-spacing:.34em;
    text-transform:uppercase;opacity:0;
    font-family:ui-monospace,Menlo,monospace;
    animation:fadeIn 1s ease-out 1.2s forwards;
  }
</style>
</head>
<body>

<!-- ============ LOADER STAGE ============ -->
<div id="loader" data-screen-label="Loader">
  <canvas id="stars"></canvas>
  <div id="scene">
    <div id="atmo"></div>
  </div>
  <div id="shock"></div>
  <div id="flash"></div>
</div>

<script>
/* ───── starfield (cheap canvas) ───── */
(function(){
  const c=document.getElementById('stars');
  const ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight;draw()}
  const stars=[];
  for(let i=0;i<260;i++) stars.push({x:Math.random(),y:Math.random(),s:Math.random()*1.4+0.2,t:Math.random()});
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(const s of stars){
      const a=0.35+0.65*Math.abs(Math.sin(performance.now()/900+s.t*7));
      ctx.fillStyle='rgba(220,230,255,'+a*0.7+')';
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.s,0,Math.PI*2);ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  addEventListener('resize',resize);resize();
})();

/* ───── earth-like equirectangular texture, procedurally drawn ───── */
function ll2px(lon,lat,W,H){return [(lon+180)/360*W,(90-lat)/180*H];}
function buildEarthTexture(){
  const W=2048,H=1024;
  const cv=document.createElement('canvas');
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');

  /* ocean — vertical gradient deep navy to teal back to deep */
  const og=ctx.createLinearGradient(0,0,0,H);
  og.addColorStop(0,'#0a1b3a');
  og.addColorStop(0.35,'#0e2f55');
  og.addColorStop(0.5,'#11406b');
  og.addColorStop(0.65,'#0e2f55');
  og.addColorStop(1,'#0a1b3a');
  ctx.fillStyle=og;ctx.fillRect(0,0,W,H);

  /* sparse noise speckle to give ocean some life */
  for(let i=0;i<3500;i++){
    const x=Math.random()*W, y=Math.random()*H;
    const a=Math.random()*0.06;
    ctx.fillStyle='rgba(140,190,230,'+a+')';
    ctx.fillRect(x,y,1,1);
  }

  /* graticule */
  ctx.lineWidth=1;ctx.strokeStyle='rgba(180,210,240,0.10)';
  for(let lat=-75;lat<=75;lat+=15){const[,y]=ll2px(0,lat,W,H);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(let lon=-165;lon<=165;lon+=15){const[x]=ll2px(lon,0,W,H);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  /* equator a touch bolder */
  ctx.strokeStyle='rgba(220,230,250,0.18)';ctx.lineWidth=1.2;
  const[,yeq]=ll2px(0,0,W,H);ctx.beginPath();ctx.moveTo(0,yeq);ctx.lineTo(W,yeq);ctx.stroke();

  /* continents — simplified poly silhouettes (same shapes as base file) */
  const continents=[
    [[-167,70],[-140,62],[-110,60],[-85,55],[-65,47],[-55,48],[-64,44],[-75,35],[-82,25],[-88,16],[-85,10],[-78,8],[-105,18],[-118,30],[-120,33],[-124,48],[-130,54],[-150,60],[-167,70]],
    [[-68,83],[-20,83],[-18,76],[-25,68],[-44,60],[-57,64],[-68,83]],
    [[-78,12],[-62,12],[-50,2],[-35,-5],[-35,-22],[-48,-28],[-52,-33],[-55,-38],[-64,-55],[-68,-55],[-65,-40],[-62,-20],[-70,-5],[-80,0],[-78,12]],
    [[-10,36],[35,36],[35,42],[28,45],[30,48],[20,55],[25,65],[15,69],[5,62],[-5,48],[-10,36]],
    [[-6,50],[2,51],[2,58],[-5,58],[-6,50]],
    [[-18,16],[-18,8],[-15,5],[-8,4],[2,5],[10,4],[18,2],[30,-2],[40,10],[50,12],[55,0],[50,-25],[34,-35],[18,-35],[8,-5],[12,4],[-16,10],[-18,16]],
    [[26,42],[35,36],[60,22],[78,8],[100,2],[104,1],[115,5],[125,22],[122,32],[130,45],[140,44],[145,50],[145,60],[135,68],[120,73],[100,78],[80,78],[60,73],[40,73],[30,70],[26,68],[26,42]],
    [[62,22],[80,8],[88,22],[78,36],[62,22]],
    [[96,22],[110,5],[120,15],[108,20],[96,22]],
    [[130,31],[132,34],[136,36],[141,44],[141,31],[130,31]],
    [[114,-22],[122,-18],[132,-12],[145,-15],[150,-22],[155,-32],[150,-40],[145,-40],[135,-34],[124,-34],[114,-28],[114,-22]],
    [[166,-45],[172,-34],[174,-38],[170,-45],[166,-45]]
  ];

  /* land gradient — warm interior, lighter coast */
  ctx.save();
  for(const pts of continents){
    ctx.beginPath();
    pts.forEach(([lo,la],i)=>{const[x,y]=ll2px(lo,la,W,H);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.closePath();
    const xs=pts.map(p=>ll2px(p[0],p[1],W,H));
    let cx=0,cy=0;xs.forEach(p=>{cx+=p[0];cy+=p[1];});cx/=xs.length;cy/=xs.length;
    const g=ctx.createRadialGradient(cx,cy,4,cx,cy,Math.max(W,H)*0.18);
    g.addColorStop(0,'#5d7a3a');g.addColorStop(0.55,'#3f5a28');g.addColorStop(1,'#2c4019');
    ctx.fillStyle=g;ctx.fill();
    /* coast highlight */
    ctx.lineWidth=2;ctx.strokeStyle='rgba(220,210,160,0.32)';ctx.stroke();
  }
  ctx.restore();

  /* polar ice caps */
  const ice=ctx.createLinearGradient(0,0,0,H*0.10);
  ice.addColorStop(0,'rgba(240,250,255,0.85)');
  ice.addColorStop(1,'rgba(240,250,255,0)');
  ctx.fillStyle=ice;ctx.fillRect(0,0,W,H*0.10);
  const ice2=ctx.createLinearGradient(0,H*0.90,0,H);
  ice2.addColorStop(0,'rgba(240,250,255,0)');
  ice2.addColorStop(1,'rgba(240,250,255,0.85)');
  ctx.fillStyle=ice2;ctx.fillRect(0,H*0.90,W,H*0.10);

  /* soft scattered cloud blots */
  ctx.globalAlpha=0.18;
  for(let i=0;i<40;i++){
    const x=Math.random()*W, y=H*0.15+Math.random()*H*0.7;
    const r=40+Math.random()*100;
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,'rgba(255,255,255,0.7)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  return cv;
}

/* ───── Three.js setup ───── */
const W=Math.min(innerWidth,innerHeight)*0.92;
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W,W);
renderer.setClearColor(0x000000,0);
renderer.domElement.id='gl';
document.getElementById('scene').appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(40,1,0.1,100);
camera.position.set(0,0.4,4.3);
camera.lookAt(0,0,0);

scene.add(new THREE.AmbientLight(0xffffff,0.85));
const key=new THREE.DirectionalLight(0xffffff,0.95);
key.position.set(3,2.5,4);scene.add(key);
const rim=new THREE.DirectionalLight(0x6aa6ff,0.55);
rim.position.set(-3,1,-2);scene.add(rim);

/* globe group — everything rotates together */
const globe=new THREE.Group();
scene.add(globe);

/* sphere */
const R=1.3;
const earthTex=new THREE.CanvasTexture(buildEarthTexture());
earthTex.anisotropy=renderer.capabilities.getMaxAnisotropy();
const sphere=new THREE.Mesh(
  new THREE.SphereGeometry(R,96,96),
  new THREE.MeshLambertMaterial({map:earthTex})
);
globe.add(sphere);

/* atmosphere shell — back-side, additive */
const atmoGeo=new THREE.SphereGeometry(R*1.06,64,64);
const atmoMat=new THREE.ShaderMaterial({
  uniforms:{c:{value:new THREE.Color(0x4a9bff)}},
  vertexShader:`
    varying vec3 vN;
    void main(){
      vN=normalize(normalMatrix*normal);
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
    }`,
  fragmentShader:`
    uniform vec3 c;
    varying vec3 vN;
    void main(){
      float f=pow(1.0-abs(vN.z),2.5);
      gl_FragColor=vec4(c,f*0.7);
    }`,
  transparent:true,
  blending:THREE.AdditiveBlending,
  side:THREE.BackSide,
  depthWrite:false,
});
scene.add(new THREE.Mesh(atmoGeo,atmoMat));

/* ───── image patches embedded on globe surface ─────
   5 portraits placed at 72° longitudinal spacing,
   alternating latitudes so they never overlap visually.
*/
const PATCH_POSITIONS=[
  {lat: 18,lon:   0},
  {lat:-18,lon:  72},
  {lat: 18,lon: 144},
  {lat:-18,lon:-144},
  {lat: 18,lon: -72},
];

const PATCH_SIZE_DEG=46;        // angular size of each patch (square)
const patchMeshes=[];

function makePatchMaterial(tex){
  /* circular mask + soft edge ring so each portrait looks like a medallion
     inset on the planet surface */
  return new THREE.ShaderMaterial({
    uniforms:{ map:{value:tex} },
    vertexShader:`
      varying vec2 vUv;
      varying vec3 vN;
      void main(){
        vUv=uv;
        vN=normalize(normalMatrix*normal);
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
      }`,
    fragmentShader:`
      uniform sampler2D map;
      varying vec2 vUv;
      varying vec3 vN;
      void main(){
        vec2 p=vUv-0.5;
        float d=length(p);
        if(d>0.5) discard;
        vec4 c=texture2D(map,vUv);
        /* soft edge fade */
        float edge=smoothstep(0.50,0.43,d);
        /* gold-ish rim ring near border */
        float ring=smoothstep(0.50,0.47,d)-smoothstep(0.47,0.44,d);
        vec3 rgb=mix(c.rgb, vec3(1.0,0.86,0.55), ring*0.65);
        /* face-camera term: dim patches on the back side a touch (handled by sphere occlusion) */
        float facing=clamp(vN.z*0.4+0.7,0.0,1.0);
        gl_FragColor=vec4(rgb*facing, edge);
      }`,
    transparent:true,
    depthWrite:false,
  });
}

function makePatchGeo(latDeg, lonDeg, sizeDeg, radius){
  const lat=THREE.MathUtils.degToRad(latDeg);
  const lon=THREE.MathUtils.degToRad(lonDeg);
  const half=THREE.MathUtils.degToRad(sizeDeg/2);
  /* SphereGeometry args:
       radius, widthSegs, heightSegs,
       phiStart, phiLength, thetaStart, thetaLength
     phi is around Y (longitude), theta is from +Y down (polar).
     Center: phi = π/2 - lon (so lon=0 lands on +Z, the camera-facing side),
             theta = π/2 - lat.
  */
  const phiCenter   = Math.PI/2 - lon;
  const thetaCenter = Math.PI/2 - lat;
  return new THREE.SphereGeometry(
    radius*1.003, 24, 24,
    phiCenter   - half, half*2,
    thetaCenter - half, half*2
  );
}

const portraits=window.PORTRAITS || [];
const loader=new THREE.TextureLoader();
let loaded=0;
PATCH_POSITIONS.forEach((p,i)=>{
  const src=portraits[i];
  if(!src) return;
  loader.load(src,(tex)=>{
    tex.anisotropy=renderer.capabilities.getMaxAnisotropy();
    tex.minFilter=THREE.LinearFilter;
    const geo=makePatchGeo(p.lat,p.lon,PATCH_SIZE_DEG,R);
    const mat=makePatchMaterial(tex);
    const mesh=new THREE.Mesh(geo,mat);
    globe.add(mesh);
    patchMeshes.push(mesh);
    loaded++;
  });
});

/* subtle axial tilt */
globe.rotation.z=THREE.MathUtils.degToRad(8);

/* ───── animation ───── */
let t0=performance.now();
let spin=0.85;            // rad/s — full rotation ≈ 7.4s
function loop(){
  requestAnimationFrame(loop);
  const t=(performance.now()-t0)/1000;
  globe.rotation.y=t*spin;
  renderer.render(scene,camera);
}
loop();

/* ───── click-to-dismiss handoff ─────
   Dissolves the globe and removes the loader entirely so whatever
   sits underneath (the host app's UI) is exposed. */
(function(){
  const loader=document.getElementById('loader');
  let going=false;
  function dismiss(){
    if(going) return; going=true;
    spin=4.5;                                 // dramatic accelerate-out
    loader.classList.add('go');
    setTimeout(()=>{ loader.remove(); },1200);
  }
  loader.addEventListener('click',dismiss);
  addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' ') dismiss(); });
})();

/* responsive */
addEventListener('resize',()=>{
  const W=Math.min(innerWidth,innerHeight)*0.92;
  renderer.setSize(W,W);
});
</script>
</body>
