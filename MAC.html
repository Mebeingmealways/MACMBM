<script>
/* ─────────────────────────────────────────────────────────────────
   PixiJS-based MBM → MAC morph
   - Glyphs are pre-rendered ONCE into textures (sprite atlas)
   - Each particle is a Sprite (GPU transform + tint) — no per-frame
     canvas text draws → renders 1000+ glyphs at 60fps with ease.
   ───────────────────────────────────────────────────────────────── */

const CHARS = ['म','ब','ए','क','ल','ड','न','त','प','र','स','ह','व','ग','ज','च','श','ध','भ','ठ','ट','अ','आ','इ','ई','उ','ओ','ण','ञ','ष','ऋ','ख','घ','छ','झ','थ','फ','य'];

const COL_WHITE  = 0xE8E6E1;
const COL_PINK   = 0xE73C96;
const COL_ACCENT = 0xD97449;

/* sRGB lerp helpers (channel-wise) */
function lerpHex(a,b,t){
  const ar=(a>>16)&255, ag=(a>>8)&255, ab=a&255;
  const br=(b>>16)&255, bg=(b>>8)&255, bb=b&255;
  const r=Math.round(ar+(br-ar)*t);
  const g=Math.round(ag+(bg-ag)*t);
  const bl=Math.round(ab+(bb-ab)*t);
  return (r<<16)|(g<<8)|bl;
}

/* Wait for the Devanagari font to settle so glyph textures bake correctly */
async function ready(){ try{ await document.fonts.ready; }catch(e){} }

/* Build a small Pixi texture for one glyph */
function makeGlyphTexture(ch, fontPx){
  const pad = Math.ceil(fontPx*0.25);
  const size = fontPx + pad*2;
  const cv = document.createElement('canvas');
  cv.width = cv.height = size;
  const c = cv.getContext('2d');
  c.font = `700 ${fontPx}px 'Noto Sans Devanagari','Mangal','Kokila','Arial Unicode MS',sans-serif`;
  c.textAlign='center'; c.textBaseline='middle';
  c.fillStyle='#ffffff';   // WHITE — we tint at runtime
  c.fillText(ch, size/2, size/2);
  return PIXI.Texture.from(cv);
}

/* Sample a text outline into target points by rasterising offscreen */
function samplePoints(text, fontPx, W, H, step){
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const c = cv.getContext('2d');
  c.fillStyle='#fff';
  c.font = `900 ${fontPx}px Georgia,"Times New Roman",serif`;
  c.textAlign='center'; c.textBaseline='middle';
  c.fillText(text, W/2, H/2);
  const d = c.getImageData(0,0,W,H).data;
  const pts=[];
  for(let y=0;y<H;y+=step)
    for(let x=0;x<W;x+=step)
      if(d[(y*W+x)*4+3] > 120) pts.push({x,y});
  return pts;
}
function resample(pts, n){
  const r=[], s=pts.length/n;
  for(let i=0;i<n;i++) r.push(pts[Math.floor(i*s)%pts.length]);
  return r;
}

(async function start(){
  await ready();

  /* ─── Pixi app ─── */
  const app = new PIXI.Application({
    resizeTo: window,
    background: 0x0e0d0c,
    antialias: true,
    autoDensity: true,
    resolution: Math.min(window.devicePixelRatio||1, 2),
    powerPreference: 'high-performance',
  });
  document.getElementById('stage').appendChild(app.view);

  let W = app.renderer.width  / app.renderer.resolution;
  let H = app.renderer.height / app.renderer.resolution;

  /* ─── Glyph textures (cached once) ─── */
  const GLYPH_PX = 64;
  const textures = CHARS.map(ch => makeGlyphTexture(ch, GLYPH_PX));

  /* ─── Big text target points ─── */
  const fontPx = Math.round(Math.min(W*0.34, H*0.55));
  const step   = Math.max(3, Math.round(fontPx/45));
  let mbmPts = samplePoints('MBM', fontPx, W|0, H|0, step);
  let macPts = samplePoints('MAC', fontPx, W|0, H|0, step);
  const N = Math.min(1400, Math.max(700, Math.round((mbmPts.length+macPts.length)/2)));
  mbmPts = resample(mbmPts, N);
  macPts = resample(macPts, N);

  /* ─── Particle container (cacheAsBitmap off; we tint per-sprite) ─── */
  const layer = new PIXI.Container();
  app.stage.addChild(layer);

  /* Render scale: how big each glyph appears on screen, relative to texture */
  const scaleBase = (fontPx*0.07) / GLYPH_PX;  // ≈ small floating glyphs

  const particles = [];
  for(let i=0;i<N;i++){
    const tex = textures[(Math.random()*textures.length)|0];
    const sp  = new PIXI.Sprite(tex);
    sp.anchor.set(0.5);
    const s = scaleBase * (0.85 + Math.random()*0.6);
    sp.scale.set(s);

    const ang  = Math.random()*Math.PI*2;
    const dist = Math.max(W,H)*0.55 + Math.random()*Math.max(W,H)*0.25;
    sp.x = W/2 + Math.cos(ang)*dist;
    sp.y = H/2 + Math.sin(ang)*dist;
    sp.rotation = (Math.random()-0.5)*1.6;
    sp.alpha = 0;
    sp.tint  = COL_WHITE;

    particles.push({
      sp,
      a: mbmPts[i], b: macPts[i],
      vx: (Math.random()-0.5)*9,
      vy: (Math.random()-0.5)*9,
      rv: (Math.random()-0.5)*0.12,
      k:  0.060 + Math.random()*0.030,
      f:  0.78  + Math.random()*0.07,
      delay: Math.random()*40,
      ph: 0, ct: 0, mt: 0,
      md: Math.random()*22,
    });

    layer.addChild(sp);
  }

  /* ─── State machine ─── */
  let frame = 0, phase = 0, pf = 0;
  let morphing = false, mFrame = 0;
  let avgM = 0;
  let dissolving = false, da = 1;

  app.ticker.maxFPS = 60;
  app.ticker.add(() => {
    if(dissolving){
      /* Dissolve: particles drift up, alpha bleeds out */
      da -= 0.018;
      for(const p of particles){
        p.vx += (Math.random()-0.5)*1.0;
        p.vy -= 0.28 + Math.random()*0.42;
        p.sp.x += p.vx; p.sp.y += p.vy;
        p.sp.rotation += 0.07;
        p.sp.alpha = Math.max(0, da*0.8);
      }
      if(da <= 0){
        app.ticker.stop();
        layer.visible = false;
        if(!window.__winkShown){ window.__winkShown = true; showWink(); }
      }
      return;
    }

    let settled = 0;
    let mtSum = 0;

    for(const p of particles){
      if(frame < p.delay){ continue; }

      p.ph = Math.min(1, p.ph + 0.035);
      if(morphing && mFrame > p.md) p.mt = Math.min(1, p.mt + 0.055);

      const tx = p.a.x + (p.b.x - p.a.x) * p.mt;
      const ty = p.a.y + (p.b.y - p.a.y) * p.mt;

      p.vx = (p.vx + (tx - p.sp.x) * p.k) * p.f;
      p.vy = (p.vy + (ty - p.sp.y) * p.k) * p.f;
      p.sp.x += p.vx;  p.sp.y += p.vy;
      p.sp.rotation += p.rv;  p.rv *= 0.88;
      p.sp.rotation *= (1 - p.mt*0.04);  // straighten as we settle into final shape

      p.ct = Math.min(1, p.ct + 0.012);

      /* Tint progression: white → pink → accent, driven by global morph t */
      let tint;
      if(avgM < 0.15)       tint = lerpHex(COL_WHITE, COL_PINK, Math.min(1, p.ct*1.8));
      else if(avgM < 0.85)  tint = lerpHex(COL_PINK, COL_ACCENT, (avgM - 0.15)/0.7);
      else                  tint = COL_ACCENT;
      p.sp.tint = tint;
      p.sp.alpha = 0.38 + p.ph*0.62;

      mtSum += p.mt;
      const dx = p.sp.x - tx, dy = p.sp.y - ty;
      if(dx*dx + dy*dy < 4 && Math.abs(p.vx) < 0.6) settled++;
    }

    avgM = mtSum / N;

    /* Phase logic */
    if(phase === 0){            // forming MBM
      if(settled > N*0.80){ phase = 1; pf = 0; }
    } else if(phase === 1){     // hold MBM
      if(++pf > 40){ phase = 2; morphing = true; pf = 0; }
    } else if(phase === 2){     // morph
      pf++;
      if(avgM > 0.96){ phase = 3; pf = 0; }
    } else if(phase === 3){     // hold MAC
      if(++pf > 55){ phase = 4; dissolving = true; }
    }
    if(morphing) mFrame++;
    frame++;
  });

  /* ─── Wink emoji entrance ─── */
  function showWink(){
    const el = document.getElementById('wink');
    const data = JSON.parse(document.getElementById('wink-data').textContent);
    const anim = lottie.loadAnimation({
      container: el,
      renderer: 'svg',
      loop: true,
      autoplay: true,
      animationData: data,
    });
    /* trigger rise on next frame so the transition catches */
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      el.classList.add('up');
    }));
  }

  /* ─── Resize ─── */
  addEventListener('resize', ()=>{
    W = app.renderer.width  / app.renderer.resolution;
    H = app.renderer.height / app.renderer.resolution;
  });
})();
</script>
